{include file="public/header" /}
<div class="layui-fluid">
    <div class="layui-card">
        <form class="layui-form layui-card-header layuiadmin-card-header-auto layui-form-pane">
            <div class="layui-btn-group" style="margin-bottom: 30px;">
                <button type="button" class="layui-btn list-shop" data-type='0'>全部</button> 
                {volist name='shop_list' id='val'}
                <button type="button" class="layui-btn layui-btn-primary list-shop" data-type='{$val.account_id}'>{$val.name}</button> 
                {/volist} 

            </div>    
            <!--<button style='float: right;margin-right: 20px;' class="layui-btn layuiadmin-btn-admin" type="button" data-type="importOrder"><i class="layui-icon"></i>导入订单</button>-->
            <div class="layui-form-item">       
                <div class="layui-inline">
                    <label class="layui-form-label">来客订单号</label>
                    <div class="layui-input-inline">
                        <input type="text" name="order_id"  placeholder="请输入来客订单号搜索" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">商品名称</label>
                    <div class="layui-input-inline">
                        <input type="text" name="product_name" placeholder="请输入商品名称搜索" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label" style='width:118px;'>来客订单状态</label>
                    <div class="layui-input-inline" style='width:182px;'>
                        <select name="order_status" lay-search="" class="layui-input"> 
                            <option value="">请选择</option> 
                            <option value="1" {if condition='$order_status eq 1'}selected{/if}>未预约</option>
                            <option value="2" {if condition='$order_status eq 2'}selected{/if}>待接单</option>
                            <option value="3" {if condition='$order_status eq 3'}selected{/if}>预约成功</option>
                            <option value="-1" {if condition='$order_status eq -1'}selected{/if}>取消/退款</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label" style='width:118px;'>订单跟进状态</label>
                    <div class="layui-input-inline" style='width:182px;'>
                        <select name="fllow_status" lay-search="" class="layui-input"> 
                            <option value="">请选择</option> 
                            <option value="1" {if condition='$fllow_status eq 1'}selected{/if}>待分配</option>
                            <option value="2" {if condition='$fllow_status eq 2'}selected{/if}>待跟进</option>
                            <option value="3" {if condition='$fllow_status eq 3'}selected{/if}>已完成</option>
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">联系人姓名</label>
                    <div class="layui-input-inline">
                        <input type="text" name="buyer_info_name" placeholder="请输入联系人姓名搜索" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">联系手机号</label>
                    <div class="layui-input-inline">
                        <input type="text" name="buyer_info_phone" value='{$buyer_info_phone}' placeholder="请输入联系手机号搜索" autocomplete="off" class="layui-input">
                    </div>
                </div> 
                <div class="layui-inline">
                    <label class="layui-form-label">销售人员</label>
                    <div class="layui-input-inline">
                        <select name="sales_user_id" lay-search=""> 
                            <option value="">请选择</option> 
                            {foreach name="sales_list" item="vo"}
                            <option value="{$vo.id}" {if condition="$vo.status eq 2" } disabled="" {/if}>{$vo.admin_name}</option>
                            {/foreach}
                        </select>
                    </div>
                </div>                 
                <div class="layui-inline">                          
                    <label class="layui-form-label">出发城市</label>
                    <div class="layui-input-inline">
                        <select name="departure" lay-search=""> 
                            <option value="">请选择</option> 
                            {foreach name="city_list" item="vo"}
                            <option value="{$vo.zone_id}">{$vo.zone_name}</option>
                            {/foreach}
                        </select>
                    </div>     
                </div>  
                <div class="layui-inline">
                    <label class="layui-form-label">即将超时</label>
                    <div class="layui-input-inline">
                        <select name="is_timeout" lay-search=""> 
                            <option value="">请选择</option>
                            <option value='1'>是</option>     
                            <option value='2'>否</option>     
                        </select>
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">出行日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="book_start_date" id="book_start_date" placeholder="年/月/日" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">预约日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="book_date" id="book_date" placeholder="年/月/日" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">完成日期</label>
                    <div class="layui-input-inline">
                        <input type="text" name="complet_date" id="complet_date" placeholder="年/月/日" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">订单标签</label>
                    <div class="layui-input-inline" style='width:300px;'>
                        <select name="tags_id" lay-search="" xm-select="tags_select"   xm-select-show-count="2" xm-select-search-type='dl'> 
                            <option value="">请选择</option> 
                               {foreach name="tags_list" item="vo"}
                            <option value="{$vo.id}">{$vo.name}</option>
                            {/foreach}                           
                        </select>
                    </div>
                </div> 
                <div class="layui-inline">
                    <button class="layui-btn" lay-submit lay-filter="LAY-user-back-search">搜索</button>
                    <button type="reset" class="layui-btn layui-btn-primary">重置</button>
                </div>
            </div>
        </form>
        <div class="layui-tab layui-tab-brief">
            <!--            <ul class="layui-tab-title">
                            <li data-type='0' class="layui-this list-status">未预约</li>
                            <li data-type='1' class="list-status" >待接单</li>
                            <li data-type='2' class="list-status" >已预约</li>
                            <li data-type='3' class="list-status" >已完成</li>
                            <li data-type='4' class="list-status" >取消/退款申请</li>
                            <li data-type='5' class="list-status" >已取消</li>
                        </ul>-->
            <div class="layui-tab-content">        
                <div class="layui-tab-item layui-show"> 
                    <table id="LAY-user-back-manage" lay-filter="LAY-user-back-manage"></table>
                    <script type="text/html" id="batch-table-toolbar">
                        <div class="layui-btn-container">
                            <button class="layui-btn layui-btn-sm" lay-event="batch_assign">批量分配</button>
                        </div>
                        </script>
                        <script type="text/html" id="table-useradmin-admin">
                            <!--<a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="edit"><i class="layui-icon layui-icon-edit"></i>编辑</a>-->
                            <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="info"><i class="layui-icon layui-icon-about"></i>详情</a>
                            <!--<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del"><i class="layui-icon layui-icon-delete"></i>删除</a>-->                            
                            </script>
                            <script type="text/html" id="order_status_tpl">
                                <span>{{d.order_status_text}}</span>         
                                {{# if(d.order_status==2){ }}
                                    <br/><span style='color:red'>{{d.order_accept_time}}后超时自动拒单</span>        
                                {{# } }}
                                {{# if(d.order_status==-1&&d.refund_status==-1){ }}
                                    <br/><span style='color:red'>有退款</span>        
                                {{# } }}
                            </script>
                            <script type="text/html" id="TPL-select-sales">   
                                {{#  var salesList = {$sales_list|raw}; }}
                                <select name="city" lay-filter="select-sales" lay-append-to="body" lay-search>
                                  <option value="">请分配销售</option>
                                  {{#  layui.each(salesList, function(i, v){ }}
                                  <option value="{{= v.id }}" {{= v.id === d.sales_user_id ? 'selected' : '' }} {{= v.status === 2 ? 'disabled' : '' }}>{{= v.admin_name }}</option>
                                  {{#  }); }}
                                </select> 
                           </script>    
                        </div>   
                    </div>

                </div>
                <div class="layui-form" style="margin-top: 20px; display: none;" id="editModal">
                    <div class="layui-form-item">
                        <label class="layui-form-label">所属销售</label>
                        <div class="layui-input-inline">
                            <select name="sales_user_id" lay-search="" id='sales_id' lay-verify="required"> 
                                <option value="">请选择销售</option> 
                                {foreach name="sales_list" item="vo"}
                                <option value="{$vo.id}" {if condition="$vo.status eq 2" } disabled="" {/if}>{$vo.admin_name}</option>
                                {/foreach}
                            </select>
                        </div> 
                    </div>
                    <div class="layui-form-item layui-hide">
                        <button class="layui-btn layui-btn-normal" id='submitForm' lay-filter="submitForm" lay-submit>确认提交</button>
                    </div>
                </div>

            </div>
        </div>
        {include file="public/footer" /}
        <link rel="stylesheet" href="__LAYUI__/formSelects-v4.css" >
        <script src="__LAYUI__/formSelects-v4.js"></script>        
        <script>
            var listUrl = 'index?order_status={$order_status}&buyer_info_phone={$buyer_info_phone}';          //当前列表 URL
            var addEditUrl = 'edit';    //新增、编辑
            var delUrl = 'del';         //删除
            var stateUrl = 'state';     //状态
            var account_id = 0;

            //动态表格
            layui.use(['table', 'upload', 'form'], function () {
                var $ = layui.$;
                var table = layui.table;
                var area = ['40%', '80%'];
                var form = layui.form;
                var laydate = layui.laydate;
                //执行渲染 - 实例 Table
                function render() {
                    table.render({
                        elem: '#LAY-user-back-manage',
                        url: listUrl + '&account_id=' + account_id,
                        page: true,
                        toolbar: '#batch-table-toolbar',
                        defaultToolbar: [], //exports 'filter', 'exports'
                        title: '订单导出',
                        totalRow: true,              
                        cellMinWidth: 80,
                        limit: 10,
                        cols: [[
                                {type: 'checkbox'},
                                {field: 'order_out_id', title: '系统编号', totalRowText: '合计'},
                                {field: 'account_id', title: '所属店铺', templet: function (d) {
                                        return d.business.name;
                                    }},
                                {field: 'order_id', title: '来客订单号'},
                                {field: 'order_status_text', title: '来客订单状态',templet: '#order_status_tpl'},
                                {field: 'fllow_status_text', title: '订单跟进状态'},
                                {field: 'item_name', title: '商品名称', templet: function (d) {
                                        return d.product.product_name;
                                    }},
                                {field: 'buyer_info', title: '联系人信息'},
//                                {field: 'buy_phone', title: '购买人手机号', edit: 'text'},
                                {title: '销售人员', templet: '#TPL-select-sales'},
                                {field: 'actual_amount', title: '订单实收(元)'},
                                {field: 'time', title: '时间',width:250},
                                {title: '订单标签',templet: function (d) {
                        var html = '';
                        for (var i = 0; i < d.tags_arr.length; i++) {
                            html += '<button class="layui-btn layui-btn-primary layui-btn-xs" >' + d.tags_arr[i] + '</button>';
                        }
                        return html;
                    }},
                                {title: '操作', toolbar: "#table-useradmin-admin", align: "center"},
                            ]],
//                        data:data,
                        done:function(res){
                             // 获取当前行数据 - 自定义方法
                            table.getRowData = function(tableId, elem){
                              var index = $(elem).closest('tr').data('index');
                              return table.cache[tableId][index] || {};
                            };
//                            console.log(res.data);
                           var $checkboxes = $('input[name="layTableCheckbox"]');
                            $checkboxes.each(function(index) {
                              if (index>0&&res.data[index-1].fllow_status>1) {
                                $(this).prop('disabled', true); // 禁用复选框
//                                $(this).parent().addClass('layui-form-checkbox layui-form-checked'); // 保持选中状态（如果需要）
                              }
                            });
                        }
                    });
                }
                var listUrlNew = listUrl + '&account_id=0';
                render(listUrlNew);
                $('.list-shop').click(function () {
                    $('.list-shop').addClass('layui-btn-primary');
                    $(this).removeClass('layui-btn-primary');
                    account_id = $(this).attr('data-type');
                    render();
                });
                // 渲染
                laydate.render({
                    elem: '#book_start_date'
                });
                laydate.render({
                    elem: '#book_date'
                });
                laydate.render({
                    elem: '#complet_date'
                });
                // layui form select 事件
                form.on('select(select-sales)', function(obj){
                  var value = obj.value; // 获取选中项 value
                  // 获取当前行数据(如 id 等字段，以作为数据修改的索引)
                  var data = table.getRowData('LAY-user-back-manage', obj.elem);
                  if(value==''){
                      layer.msg('请选择分配销售员', {icon: 0, time: 1500, shade: 0.1, });
                      layui.table.reload("LAY-user-back-manage");
                      return false;
                  }
                  if(data.fllow_status==3){
                      layer.msg('该订单已处理，不能更改销售员', {icon: 0, time: 1500, shade: 0.1, });
                      layui.table.reload("LAY-user-back-manage");
                      return false;
                  }
                   layui.$.post('updataValue', {id: data.id, field: 'sales_user_id', value: value}, function (data) {
                        if (data.code == 1000) {
                            layer.msg('分配成功', {icon: 6, time: 1500, shade: 0.1, });
                        } else {
                            layer.msg('分配失败', {icon: 0, time: 1500, shade: 0.1, });
                        }
                    });                  
                });
                //监听单元格编辑
                table.on('edit(LAY-user-back-manage)', function (obj) {
                    var value = obj.value; //得到修改后的值
                    var id = obj.data.id;
                    layui.$.post('updataValue', {id: id, field: obj.field, value: value}, function (data) {
                        if (data.code == 1000) {
                            layer.msg(data.msg, {icon: 1, time: 1500, shade: 0.1, });
                        } else {
                            layer.msg(data.msg, {icon: 2, time: 1500, shade: 0.1, });
                        }
                    });
                });
                //头工具栏事件
                table.on('toolbar(LAY-user-back-manage)', function (obj) {
                    var checkStatus = table.checkStatus(obj.config.id);
                    if (checkStatus.data.length === 0) {
                        return layer.msg('请选择数据');
                    }
                    var ids = '';
                    for (var i = 0; i < checkStatus.data.length; i++) {
                        ids += checkStatus.data[i].id + ',';
                    }
                    switch (obj.event) {
                        case 'batch_assign':
                            layui.$('#sales_id').val('');
                            form.render('select');
                            layer.open({
                                type: 1, // 页面层类型
                                title: '批量分配销售', // 标题文字
                                area: ['20%', '30%'],
                                btn: ['确认分配'],
                                btnAlign: 'c',
                                content: $('#editModal'), // 内容元素ID或DOM对象                                
                                yes: function (index, layero) { // 弹出层成功后的回调函数，可以用来设置弹出层的样式等
                                    var sales_id = layui.$('#sales_id').val();
                                    if (sales_id == '') {
                                        layer.msg('请选择分配客服', {icon: 2});
                                        return false;
                                    }
                                    layui.$.post('batchUpdate', {ids: ids, field: 'sales_user_id', value: sales_id}, function (res) {
                                        if (res.code == 1000) {
                                            layer.msg('分配成功', {offset: '15px', icon: 1, time: 1500}, function () {
                                                layui.table.reload("LAY-user-back-manage");
                                                layer.close(index);
                                            });
                                        } else {
                                            layer.msg(res.msg, {offset: '15px', icon: 2, time: 1000});
                                            return false;
                                        }
                                    });

                                }
                            });

//                            var data = checkStatus.data;
//                            layer.alert(JSON.stringify(data));
                            break;
                        case 'getCheckLength':
                            var data = checkStatus.data;
                            layer.msg('选中了：' + data.length + ' 个');
                            break;
                        case 'isAll':
                            layer.msg(checkStatus.isAll ? '全选' : '未全选');
                            break;
                    }
                    ;
                });
                //监听动态表格中的事件
                table.on("tool(LAY-user-back-manage)", function (e) {
                    //e.data;   当前行数据
                    var id = e.data.id;
                    switch (e.event) {
                        case 'edit':
                            //编辑
                            var url = addEditUrl + "?id=" + id;
                            tpmsg.addEdit(url, area, "订单编辑");
                            break;
                        case 'info':
                            //详情
                            var url = "info?id=" + id;
                            tpmsg.DataInfo(url, ['100%', '100%'], "<span class='layui-font-18'>订单详情</span>&nbsp;&nbsp;<span class='layui-font-gray'>系统编号："+e.data.order_out_id+"；所属店铺："+e.data.business.name+"；来客订单号："+e.data.order_id+"</span>");
                            break;
                        case 'del':
                            //删除
                            tpmsg.confirm(id, delUrl);
                            break;
                    }
                });
                //监听表格上列的添加、搜索框事件
                $('.layui-btn.layuiadmin-btn-admin').on('click', function () {
                    var type = $(this).data('type');
                    switch (type) {
                        case 'importOrder':
                            layer.open({
                                type: 2,
                                title: '导入订单',
                                area: ['30%', '50%'],
                                btnAlign: 'c',
                                maxmin: true,
                                content: 'importOrder',
                                yes: function (e, t) {
                                    layer.close(e);
                                }, end: function () {
                                    //                                location.reload();
                                }
                            });
                            break;
                        case 'add':
                            tpmsg.addEdit(addEditUrl, area, "添加订单");
                            break;
                    }
                });
            });
        </script>
