{include file="public/header" /}
<body>
<div class="layui-fluid">
<div class="layui-card">
    <div class="layui-form" lay-filter="layuiadmin-form-useradmin" id="layuiadmin-form-useradmin" >
        <input type="hidden" name="id"  value="{$tags.id}" >      
        <div class="layui-form-item" style="padding-top:20px;">
            <label class="layui-form-label">标签名称</label>
            <div class="layui-input-inline">
                <input type="text" name="name" lay-verify="required" value="{$tags.name}" placeholder="请输入标签名称" autocomplete="off"  maxlength="20" class="layui-input">
            </div>
        </div> 
        <div class="layui-form-item">
            <div class="layui-form-label">标签类型</div>
            <div class="layui-input-inline">
                <select name="type" lay-verify="required" >
                    <option value="">请选择</option>
                    <option value="1" {if condition='$tags.type eq 1'}selected{/if}>人群标签</option>
                    <option value="2" {if condition='$tags.type eq 2'}selected{/if}>订单标签</option>
                </select>
            </div>   
        </div>  
        <div class="layui-form-item" style="padding-bottom:20px;">
            <label class="layui-form-label">状态</label>
            <div class="layui-input-inline">
                <input type="checkbox" lay-verify="required" value="1" lay-filter="status" name="status" {if condition="$tags.status eq 1" }checked{/if} lay-skin="switch" lay-text="{:lang('open')}|{:lang('close')}">
            </div>
        </div>
        <div class="layui-form-item layui-hide">
            <input type="layui-btn" lay-submit lay-filter="LAY-user-back-submit" id="LAY-user-back-submit" value="{:lang('determine')}">
        </div>
    </div>
</div>
</div>

<script src="__LAYUI__/layui/layui.js"></script>
<script>
    layui.config({
        base: '__LAYUI__/' //静态资源所在路径
    }).extend({
        index: 'lib/index' //主入口模块
    }).use(['index','form', 'upload', 'laydate','layarea'],function(){
         //执行实例
        var upload = layui.upload;
        var laydate = layui.laydate;
        var layarea = layui.layarea;
            //时间范围
            laydate.render({
              elem: '#hours'
              ,type: 'time'
              ,range: true
            });
            layarea.render({
                elem: '#area-picker',
                change: function (res) {
                    //选择结果
                    console.log(res);
                }
            });
        var uploadInst = upload.render({
            elem: '#image'                                          //绑定元素
            , url: "{:url('/system/upload/upload')}"                 //上传接口
            , accept: 'images'                                        //图片类型
            , multiple: false                                         //是否多张图片
            , number: 0                                               //限制上传图片数量
            , acceptMime: 'image/*'
            , before: function (obj) {
                //预读本地文件示例
                //layui.$('#preview').append('<img src="'+ res.data.fullSrc +'" class="layui-upload-img">');
            }
            , done: function (res) {
                //上传完毕回调
//                console.log(res);
                layui.$('#image_src').attr('src', res.data.fullSrc); //图片链接（base64）
                layui.$('#imgurl').val(res.data.src);
            }
            , error: function () {
                //请求异常回调
            }
        });
    })
</script>
</body>
</html>
