{include file="public/header" /}
<div class="layui-fluid">
    <div class="layui-card">
        <div class="layui-form layui-card-header layuiadmin-card-header-auto" >
            <div class="layui-btn-group" style="margin-bottom: 30px;">
                <button type="button" class="layui-btn list-shop" data-type='0'>全部</button> 
                {volist name='shop_list' id='val'}
                <button type="button" class="layui-btn layui-btn-primary list-shop" data-type='{$val.account_id}'>{$val.name}</button> 
                {/volist} 
            </div>
            <div class="layui-form-item">
                <div class="layui-inline">
                    <label class="layui-form-label">抖音产品ID</label>
                    <div class="layui-input-block">
                        <input type="text" name="product_id" id='product_id'  placeholder="请输入抖音产品ID搜索" autocomplete="off" class="layui-input">
                    </div>
                </div>
                <div class="layui-inline">
                    <label class="layui-form-label">产品名称</label>
                    <div class="layui-input-block">
                        <input type="text" name="product_name" id='product_name'  placeholder="请输入产品名称搜索" autocomplete="off" class="layui-input">
                    </div>
                </div>                 
                <div class="layui-inline">
                    <button class="layui-btn layuiadmin-btn-admin" lay-submit lay-filter="LAY-user-back-search">
                        搜索
                    </button>
                </div>
            </div>
        </div>
        <div class="layui-tab layui-tab-brief">
            <ul class="layui-tab-title">
                <li data-type='1' class="layui-this list-status">已上架<span class="layui-badge layui-bg-green" id='status_up'>99</span></li>
                <li data-type='2' class="list-status" >已下架<span class="layui-badge" id='status_down'>15</span></li>               
            </ul>
            <div class="layui-tab-content">        
                <div class="layui-tab-item layui-show"> 
                    <table id="LAY-user-back-manage" lay-filter="LAY-user-back-manage"></table>              

                </div>   
            </div>

        </div>
    </div>
</div>
<link rel="stylesheet" href="__LAYUI__/formSelects-v4.css" >
<script src="__LAYUI__/formSelects-v4.js"></script>
{include file="public/footer" /}

<script>
    var listUrl = 'index';          //当前列表 URL
    var addEditUrl = 'edit';    //新增、编辑
    var delUrl = 'del';         //删除
    var stateUrl = 'state';     //状态
    var account_id = 0;
    var online_status=1;
    var product_id='';
    var product_name='';
    //动态表格
    layui.use(['table', 'upload', 'form'], function () {
        var $ = layui.$;
        var table = layui.table;
        var area = ['40%', '80%'];
        var form = layui.form;
        //执行渲染 - 实例 Table
        function render() {
            table.render({
                elem: '#LAY-user-back-manage',
                url: listUrl + '?account_id=' + account_id+'&online_status='+online_status,
                page: true,
                where:{product_id: product_id, product_name: product_name},
                totalRow: true,
                limit: 10,
                cols: [[
                        {field: 'account_name', title: '商家名称'},  
                        {field: 'product_id', title: '抖音产品ID', width: 150},    
                        {field: 'category_full_name', title: '分类名'},              
                        {field: 'product_name', title: '产品名称'}, 
                        {field: 'actual_amount', title: '实际支付价格(元)', width: 80},
                        {field: 'origin_amount', title: '原价(元)', width: 80},
                        {field: 'stock_qty', title: '库存', width: 80},
                        {field: 'sold_start_time', title: '售卖开始时间', width: 120},
                        {field: 'sold_end_time', title: '售卖结束时间', width: 120},      
                        {field: 'create_time', title: '创建时间', width: 120},
                        {field: 'update_time', title: '更新时间', width: 120},                        
                    ]],
                parseData:function(res){
                    $('#status_up').html(res.status_1);
                    $('#status_down').html(res.status_2);
                }
            });
        }
        var listUrlNew = listUrl + '?account_id=0'+'&online_status='+online_status;
        render(listUrlNew);
        $('.list-shop').click(function () {
            $('.list-shop').addClass('layui-btn-primary');
            $(this).removeClass('layui-btn-primary');
            account_id = $(this).attr('data-type');
            product_id=$('#product_id').val();
            product_name=$('#product_name').val();
            render();
        });
        $('.list-status').click(function () {
            $('.list-status').addClass('layui-this');
            $(this).removeClass('layui-this');
            online_status = $(this).attr('data-type');
            product_id=$('#product_id').val();
            product_name=$('#product_name').val();
            render();
        });
        //监听单元格编辑
        table.on('edit(LAY-user-back-manage)', function (obj) {
            var value = obj.value; //得到修改后的值
            var id = obj.data.id;
            layui.$.post('updataValue', {id: id, field: obj.field, value: value}, function (data) {
                if (data.code == 1000) {
                    layer.msg(data.msg, {icon: 1, time: 1500, shade: 0.1, });
                } else {
                    layer.msg(data.msg, {icon: 2, time: 1500, shade: 0.1, });
                }
            });
        });
        //头工具栏事件
        table.on('toolbar(LAY-user-back-manage)', function (obj) {
            var checkStatus = table.checkStatus(obj.config.id);
            if (checkStatus.data.length === 0) {
                return layer.msg('请选择数据');
            }
            var ids = '';
            for (var i = 0; i < checkStatus.data.length; i++) {
                ids += checkStatus.data[i].id + ',';
            }
            switch (obj.event) {
                case 'batch_assign':
                    layui.$('#kefu_id').val('');
                    form.render('select');
                    layer.open({
                        type: 1, // 页面层类型
                        title: '批量分配客服', // 标题文字
                        area: ['20%', '30%'],
                        btn: ['确认分配'],
                        btnAlign: 'c',
                        content: $('#editModal'), // 内容元素ID或DOM对象                                
                        yes: function (index, layero) { // 弹出层成功后的回调函数，可以用来设置弹出层的样式等
                            var kefu_id = layui.$('#kefu_id').val();
                            if (kefu_id == '') {
                                layer.msg('请选择分配客服', {icon: 2});
                                return false;
                            }
                            layui.$.post('batchUpdate', {ids: ids, field: 'kefu_id', value: kefu_id}, function (res) {
                                if (res.code == 1000) {
                                    layer.msg(res.msg, {offset: '15px', icon: 1, time: 1500}, function () {
                                        layui.table.reload("LAY-user-back-manage");
                                        layer.close(index);
                                    });
                                } else {
                                    layer.msg(res.msg, {offset: '15px', icon: 2, time: 1000});
                                    return false;
                                }
                            });

                        }
                    });

//                            var data = checkStatus.data;
//                            layer.alert(JSON.stringify(data));
                    break;
                case 'getCheckLength':
                    var data = checkStatus.data;
                    layer.msg('选中了：' + data.length + ' 个');
                    break;
                case 'isAll':
                    layer.msg(checkStatus.isAll ? '全选' : '未全选');
                    break;
            }
            ;
        });
        //监听动态表格中的事件
        table.on("tool(LAY-user-back-manage)", function (e) {
            //e.data;   当前行数据
            var id = e.data.id;
            switch (e.event) {
                case 'edit':
                    //编辑
                    var url = addEditUrl + "?id=" + id;
                    tpmsg.addEdit(url, area, "订单编辑");
                    break;
                case 'info':
                    //详情
                    var url = "info?id=" + id;
                    tpmsg.DataInfo(url, ['80%', '90%'], "<span class='layui-font-18'>订单详情</span>&nbsp;&nbsp;<span class='layui-font-gray'>系统编号：A251215190001；所属店铺：店铺1；来客订单号：1089391769758428895</span>");
                    break;
                case 'del':
                    //删除
                    tpmsg.confirm(id, delUrl);
                    break;
            }
        });
        //监听表格上列的添加、搜索框事件
        $('.layui-btn.layuiadmin-btn-admin').on('click', function () {
            var type = $(this).data('type');
            switch (type) {
                case 'importOrder':
                    layer.open({
                        type: 2,
                        title: '导入订单',
                        area: ['30%', '50%'],
                        btnAlign: 'c',
                        maxmin: true,
                        content: 'importOrder',
                        yes: function (e, t) {
                            layer.close(e);
                        }, end: function () {
                            //                                location.reload();
                        }
                    });
                    break;
                case 'add':
                    tpmsg.addEdit(addEditUrl, area, "添加订单");
                    break;
            }
        });
    });
</script>
