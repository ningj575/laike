{include file="public/header" /}
<body>
    <div class="layui-fluid">
        <div class="layui-row layui-col-space15">
            <div class="layui-col-md12">
                <div class="layui-card">
                    <div class="layui-card-header">应用配置</div>
                    <div class="layui-card-body" pad15>
                        <div class="layui-form" lay-filter="">
                            <div class="layui-form-item">
                                <label class="layui-form-label">应用名称</label>
                                <div class="layui-input-inline">
                                    <input type="name" name="app_name" lay-verify="required"  value="{$config.app_name??''}" lay-verType="tips" class="layui-input">
                                </div>
                            </div>
                            <div class="layui-form-item">
                                <label class="layui-form-label">APPID</label>
                                <div class="layui-input-inline">
                                    <input type="name" name="app_id" lay-verify="required"  value="{$config.app_id??''}" lay-verType="tips" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                             <div class="layui-form-item">
                                <label class="layui-form-label">AppSecret</label>
                                <div class="layui-input-block">
                                    <input type="name" name="app_secret" lay-verify="required" value="{$config.app_secret??''}" lay-verType="tips" autocomplete="off" class="layui-input">
                                </div>
                            </div>
                            <div  class="layui-form-item">
                                <label class="layui-form-label">应用图标</label>
                                <div class="layui-input-inline">
                                    <div class="layui-upload">
                                        <button type="button" class="layui-btn" id="image"><i class="layui-icon">&#xe67c;</i>上传</button>
                                        <input type="hidden" name="app_logo" value="{$config.app_logo??''}" id="imgurl">
                                        <div class="layui-upload-list">
                                            <img class="layui-upload-img" id="image_src" style="width: 100px;height: 100px"  {notempty name="config.app_logo_url" }src="{$config.app_logo_url}"{/notempty}>
                                                 <p id="demoText"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="layui-form-item">
                                <div class="layui-input-block">
                                    <button class="layui-btn" lay-submit lay-filter="set_config">确认保存</button>
                                </div>
                            </div>
                        
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="__LAYUI__/layui/layui.js"></script>
    <script src="__LAYUI__/upload.js?v=1"></script>
    <script>
        layui.config({
            base: '__LAYUI__/' //静态资源所在路径
        }).extend({
            index: 'lib/index' //主入口模块
        }).use(['index', 'set','form'], function () {
            layui.form.on("submit(set_config)",function(t){
                layui.$.post('set', t.field, function (res) {
                        if (res.code == 1000) {
                            layer.msg(res.msg, {icon: 1, time: 1500, shade: 0.1},function(){
                                location.reload();
                            });                            
                        } else {
                            layer.msg(res.msg, {icon: 0, time: 1500, shade: 0.1});
                        }
                    });
            });
            var imgParam = {
                elementId: '#imgurl', //存储数据的隐藏控件
                elem: '#image', //点击上传的按钮
                preview: '#image_src', //预览的DIV
                number: 1, //数量限制
                rootUrl: '__ROOT__', //初始化专用路径
                againUploadId: '#demoText'
            };
            uploadImage(imgParam);


        })


    </script>
</body>
</html>
